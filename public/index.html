<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나만의 메모장</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar: notebooks & tags -->
      <aside class="sidebar">
        <div class="brand">📓 메모장</div>

        <button class="new-note-btn" id="newNoteBtn">+ 새 노트</button>

        <nav class="nav">
          <div class="nav-item" data-view="all">📋 모든 노트</div>
          <div class="nav-item" data-view="trash">🗑️ 휴지통</div>
        </nav>

        <div class="section">
          <div class="section-header">
            <span>노트북</span>
            <button class="icon-btn" id="addNotebookBtn" title="노트북 추가">+</button>
          </div>
          <ul class="list" id="notebookList"></ul>
        </div>

        <div class="section">
          <div class="section-header"><span>태그</span></div>
          <ul class="list" id="tagList"></ul>
        </div>
      </aside>

      <!-- Note list pane -->
      <section class="notelist">
        <div class="search-bar">
          <input type="search" id="searchInput" placeholder="검색…" />
        </div>
        <div class="notelist-title" id="notelistTitle">모든 노트</div>
        <ul class="notes" id="notesContainer"></ul>
      </section>

      <!-- Editor pane -->
      <section class="editor" id="editorPane">
        <div class="empty-state" id="emptyState">
          <p>노트를 선택하거나 새로 만들어 보세요.</p>
        </div>

        <div class="editor-inner hidden" id="editorInner">
          <div class="editor-toolbar">
            <select id="notebookSelect" title="노트북"></select>
            <div class="spacer"></div>
            <button class="tool" data-cmd="bold" title="굵게"><b>B</b></button>
            <button class="tool" data-cmd="italic" title="기울임"><i>I</i></button>
            <button class="tool" data-cmd="underline" title="밑줄"><u>U</u></button>
            <button class="tool" data-cmd="strikeThrough" title="취소선"><s>S</s></button>
            <button class="tool" data-cmd="insertUnorderedList" title="목록">•</button>
            <button class="tool" data-cmd="insertOrderedList" title="번호 목록">1.</button>
            <button class="tool" data-cmd="formatBlock" data-value="h2" title="제목">H</button>
            <button class="tool" data-cmd="formatBlock" data-value="blockquote" title="인용">❝</button>
            <div class="spacer"></div>
            <button class="tool" id="pinBtn" title="고정">📌</button>
            <button class="tool danger" id="trashBtn" title="휴지통으로">🗑️</button>
            <button class="tool danger hidden" id="restoreBtn" title="복원">♻️</button>
            <button class="tool danger hidden" id="deleteBtn" title="완전 삭제">✕</button>
          </div>

          <input type="text" class="title-input" id="titleInput" placeholder="제목" />

          <div class="tags-row">
            <span class="tags-label">태그:</span>
            <div class="tag-chips" id="tagChips"></div>
            <input type="text" class="tag-input" id="tagInput" placeholder="태그 추가 후 Enter" />
          </div>

          <div class="content-area" id="contentArea" contenteditable="true"></div>

          <div class="editor-status" id="editorStatus"></div>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
